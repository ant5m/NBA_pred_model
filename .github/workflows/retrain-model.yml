name: Retrain NBA Prediction Model

on:
  schedule:
    # Run weekly on Sundays at 2 AM EST (7 AM UTC)
    - cron: '0 7 * * 0'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  retrain-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Retrain model
        run: |
          echo "Starting model retraining..."
          response=$(curl -s -X POST \
            -m 3600 \
            https://nbapredmodel-production.up.railway.app/admin/retrain-model)
          echo "Response: $response"
          
          # Check if retrain was successful
          if echo "$response" | grep -q '"status":"success"'; then
            echo "✅ Model retrained successfully"
          else
            echo "⚠️  Retrain completed with warnings or errors"
            echo "$response"
          fi
